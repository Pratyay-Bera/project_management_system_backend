spring.application.name=your_project_name
spring.profiles.active=dev

server.port=8080
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/your_db
spring.datasource.username=your_username
spring.datasource.password=your_password

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_mail
spring.mail.password=your_spring_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

razorpay.api.key=your_api_key
razorpay.api.secret=your_api_secret